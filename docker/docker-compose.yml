name: apikel6

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: apikel6-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://api.melvin.my.id
      - APP_KEY=base64:BVzpd4XK2VJE0z6pGo0eT8Kvw0CxJPjSMQubJflW3Js=
      - DB_CONNECTION=mysql
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_DATABASE=apikelompok6
      - DB_USERNAME=mel
      - DB_PASSWORD=root
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: apikel6-worker
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://api.melvin.my.id
      - APP_KEY=base64:BVzpd4XK2VJE0z6pGo0eT8Kvw0CxJPjSMQubJflW3Js=
      - DB_CONNECTION=mysql
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_DATABASE=apikelompok6
      - DB_USERNAME=mel
      - DB_PASSWORD=root
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
    command: php artisan queue:work redis --sleep=3 --tries=3 --queue=notifications,default
