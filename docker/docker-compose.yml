name: apikel6

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: apikel6-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_DATABASE=apikelompok6
      - DB_USERNAME=mel
      - DB_PASSWORD=root
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
