name: apikelompok6

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: api-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ..:/var/www/html
    networks:
      - api-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_DATABASE=apikelompok6
      - DB_USERNAME=apikelompok6
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis

  mysql:
    image: mysql:8.0
    container_name: api-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: apikelompok6
      MYSQL_USER: apikelompok6
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - api-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: api-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - api-network

networks:
  api-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
